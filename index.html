<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roast My Portfolio 🔥</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root { --fire: #ff4500; --fire2: #ff8c00; --bg: #0a0a0a; --card: #111111; --border: #222; --text: #f0f0f0; --muted: #555; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    body::before { content: ''; position: fixed; top: -50%; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,69,0,0.07) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    .container { max-width: 700px; width: 100%; position: relative; z-index: 1; }
    header { text-align: center; margin-bottom: 50px; }
    .flame { font-size: 64px; display: block; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 10vw, 80px); letter-spacing: 4px; background: linear-gradient(135deg, var(--fire), var(--fire2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 12px; }
    .subtitle { color: var(--muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
    .subtitle span { color: var(--fire); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 32px; margin-bottom: 24px; }
    .card-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--fire); margin-bottom: 16px; }
    textarea { width: 100%; background: #0d0d0d; border: 1px solid var(--border); border-radius: 2px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 14px; padding: 16px; resize: none; height: 100px; outline: none; transition: border-color 0.2s; }
    textarea:focus { border-color: var(--fire); }
    textarea::placeholder { color: var(--muted); }
    .examples { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .example-chip { background: #1a1a1a; border: 1px solid var(--border); border-radius: 2px; padding: 6px 12px; font-size: 11px; color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: 'Space Mono', monospace; }
    .example-chip:hover { border-color: var(--fire); color: var(--fire); }
    button { width: 100%; margin-top: 16px; padding: 18px; background: var(--fire); border: none; border-radius: 2px; color: white; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; cursor: pointer; transition: all 0.2s; }
    button:hover:not(:disabled) { background: var(--fire2); transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { text-align: center; font-size: 12px; color: var(--muted); margin-top: 12px; min-height: 18px; }
    .status.loading { color: var(--fire2); animation: blink 1s ease-in-out infinite; }
    .status.error { color: #ff3333; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .roast-box { display: none; background: #0d0d0d; border: 1px solid var(--fire); border-radius: 2px; padding: 24px; margin-top: 24px; }
    .roast-box.visible { display: block; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .roast-label { font-size: 10px; letter-spacing: 3px; color: var(--fire); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .roast-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .roast-text { font-size: 16px; line-height: 1.8; color: #e0e0e0; font-style: italic; }
    .onchain-badge { display: inline-block; margin-top: 16px; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    footer { margin-top: 60px; text-align: center; font-size: 11px; color: #333; letter-spacing: 2px; }
    footer a { color: var(--fire); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="flame">🔥</span>
      <h1>Roast My Portfolio</h1>
      <p class="subtitle">Powered by <span>GenLayer AI Consensus</span> — Verdict stored onchain</p>
    </header>

    <div class="card">
      <p class="card-label">Your Portfolio</p>
      <textarea id="portfolioInput" placeholder="e.g. 80% SHIB, 15% LUNA, 5% BTC"></textarea>
      <div class="examples">
        <span class="example-chip" onclick="setExample('80% SHIB, 15% LUNA, 5% BTC')">Degen Classic</span>
        <span class="example-chip" onclick="setExample('50% ETH, 30% BTC, 20% USDT')">Safe Sam</span>
        <span class="example-chip" onclick="setExample('100% PEPE')">Full Degen</span>
        <span class="example-chip" onclick="setExample('40% BTC, 30% ETH, 20% SOL, 10% LINK')">Diversified Chad</span>
      </div>
      <button id="roastBtn" onclick="submitRoast()">🔥 ROAST ME</button>
      <p class="status" id="statusMsg"></p>

      <div class="roast-box" id="roastResult">
        <div class="roast-label">AI Verdict</div>
        <p class="roast-text" id="roastText"></p>
        <span class="onchain-badge">⛓ Powered by GenLayer Intelligent Contract</span>
      </div>
    </div>

    <footer>
      Built on <a href="https://genlayer.com" target="_blank">GenLayer</a> — AI validators reach consensus on your portfolio's fate
    </footer>
  </div>

  <script>
    function setExample(text) {
      document.getElementById('portfolioInput').value = text;
    }

    async function submitRoast() {
      const portfolio = document.getElementById('portfolioInput').value.trim();
      if (!portfolio) return;

      const btn = document.getElementById('roastBtn');
      const status = document.getElementById('statusMsg');
      const resultBox = document.getElementById('roastResult');
      const roastText = document.getElementById('roastText');

      btn.disabled = true;
      resultBox.classList.remove('visible');
      status.className = 'status loading';
      status.textContent = '⏳ AI validators are roasting your portfolio...';

      try {
        const res = await fetch('/api/roast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ portfolio })
        });

        const data = await res.json();

        if (data.roast) {
          roastText.textContent = '"' + data.roast + '"';
          resultBox.classList.add('visible');
          status.className = 'status';
          status.textContent = '';
        } else {
          throw new Error(data.error || 'Something went wrong');
        }
      } catch (e) {
        status.className = 'status error';
        status.textContent = '❌ ' + e.message;
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
